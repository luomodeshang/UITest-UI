<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BroadTech System · 数据质量监控平台 v2.0</title>
<style>
/* ===== 全局全局样式 ===== */
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  background: #0a0e17;
  color: #e0e8f0;
  font-family: 'Microsoft YaHei', 'PingFang SC', -apple-system, sans-serif;
}
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:#111827; }
::-webkit-scrollbar-thumb { background:#2a3a5c; border-radius:3px; }
::-webkit-scrollbar-corner { background:#111827; }

.app { height:100vh; display:flex; flex-direction:column; }

/* ===== 顶部栏 ===== */
.top-bar {
  height:60px; min-height:60px;
  display:flex; align-items:center; justify-content:flex-start;
  background: linear-gradient(135deg, #0f1729 0%, #1a2744 100%);
  border-bottom:1px solid #1e3a5f;
  padding:0 24px;
}
.top-bar__brand {
  display:flex; align-items:flex-end; gap:0px;
  margin-left:auto;
  margin-right:180px;
}
.top-bar__icon {
  display:block;
  width:36px; height:47px;
  filter: drop-shadow(0 0 4px rgba(0,212,255,0.5));
}
.top-bar__title {
  font-size:0.875rem; font-weight:400;
  color:#ffffff;
  letter-spacing:1px;
  margin-bottom:5px;
}
.top-bar::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent 0%, #00d4ff 50%, transparent 100%);
  opacity:0.6;
}

/* ===== 中间内容区 ===== */
.mid-area {
  flex:1; display:flex; overflow:hidden;
  background: #0d111d;
}

/* ===== 左侧面板 ===== */
.left-panel {
  width:200px; min-width:200px;
  background: #0f1729;
  border-right:1px solid #1e3a5f;
  display:flex; flex-direction:column; align-items:center; padding:16px 0;
}
.dataset-selector {
  width:170px; margin-bottom:20px;
}
.dataset-selector label {
  display:block; font-size:0.75rem; color:#64748b; margin-bottom:6px;
  text-align:center; letter-spacing:1px;
}
.dataset-selector select {
  width:100%; padding:8px 12px;
  background:#1a2236; color:#e0e8f0; border:1px solid #2a3a5c;
  border-radius:6px; font-size:0.85rem; cursor:pointer;
  outline:none; transition:border-color 0.3s;
}
.dataset-selector select:hover { border-color:#00d4ff; }
.dataset-selector select:focus { border-color:#0088ff; box-shadow:0 0 8px rgba(0,136,255,0.3); }
.btn-group { display:flex; flex-direction:column; gap:10px; width:170px; }
.btn {
  width:100%; padding:12px 0;
  background:linear-gradient(135deg, #1a2236, #1e2a45);
  border:1px solid #2a3a5c; border-radius:8px;
  color:#94a3b8; font-size:0.85rem; cursor:pointer;
  transition:all 0.3s; text-align:center; letter-spacing:1px;
  position:relative; overflow:hidden;
}
.btn:hover {
  border-color:#00d4ff; color:#fff;
  box-shadow:0 0 15px rgba(0,212,255,0.15);
  transform:translateX(2px);
}
.btn::before {
  content:''; position:absolute; left:0; top:0; width:3px; height:100%;
  background:#00d4ff; transform:scaleY(0); transition:transform 0.3s;
}
.btn:hover::before { transform:scaleY(1); }
.btn:active { transform:scale(0.97); }
.btn-import { border-left:3px solid #3b82f6; }
.btn-export { border-left:3px solid #8b5cf6; }
.btn-export:disabled { opacity:0.4; cursor:not-allowed; transform:none; background:#1a2236; border-color:#1e3a5f; color:#475569; }
.btn-export:disabled::before { display:none; }
.btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
.btn-import.active { background:rgba(59,130,246,0.15); border-color:#3b82f6; color:#60a5fa; }
.btn-miss.active { background:rgba(16,185,129,0.15); border-color:#10b981; color:#34d399; }
.btn-dup.active { background:rgba(245,158,11,0.15); border-color:#f59e0b; color:#fbbf24; }
.btn-outlier.active { background:rgba(239,68,68,0.15); border-color:#ef4444; color:#f87171; }
.btn-preprocess.active { background:rgba(139,92,246,0.15); border-color:#8b5cf6; color:#a78bfa; }
.btn-noise.active { background:rgba(34,211,238,0.15); border-color:#22d3ee; color:#67e8f9; }
.btn-norm.active { background:rgba(251,191,36,0.15); border-color:#fbbf24; color:#fcd34d; }

/* ===== 中间表格区 ===== */
.center-panel {
  flex:1; display:flex; flex-direction:column; overflow:hidden;
  background:#0d111d;
}
.table-toolbar {
  height:44px; min-height:44px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; background:#111827; border-bottom:1px solid #1e3a5f;
}
.table-toolbar .info { font-size:0.8rem; color:#64748b; }
.table-toolbar .info span { color:#00d4ff; }
.toggle-scroll {
  padding:6px 16px; border-radius:6px; font-size:0.8rem; cursor:pointer;
  background:#1a2236; color:#64748b; border:1px solid #2a3a5c;
  transition:all 0.3s;
}
.toggle-scroll:hover { border-color:#00d4ff; color:#fff; }
.toggle-scroll.running { background:rgba(0,212,255,0.1); border-color:#00d4ff; color:#00d4ff; }

.table-wrapper {
  flex:1; overflow:auto; position:relative;
}
table {
  border-collapse:collapse; font-size:0.78rem; width:max-content;
}
thead { position:sticky; top:0; z-index:2; }
th {
  background:#1a2744; padding:6px 10px; white-space:nowrap;
  border:1px solid #1e3a5f; color:#94a3b8; font-weight:600;
  text-align:center;
}
th:first-child { position:sticky; left:0; z-index:3; background:#1a2744; }
td {
  padding:5px 10px; white-space:nowrap; text-align:right;
  border:1px solid #1a2236; font-family:'Consolas','Courier New',monospace;
  transition:background 0.4s;
}
td:first-child { position:sticky; left:0; z-index:1; background:#111827; color:#64748b; text-align:center; font-weight:500; }
tr:hover td { background:rgba(30,58,95,0.5); }
tr:hover td:first-child { background:#1a2744; }

/* 异常标记色 */
td.initial-anomaly { background:rgba(239,68,68,0.25) !important; color:#fca5a5; }
tr.initial-anomaly td:not(:first-child) { background:rgba(239,68,68,0.25) !important; color:#fca5a5; }
td.missing { background:rgba(16,185,129,0.25) !important; color:#6ee7b7; }
td.duplicate { background:rgba(245,158,11,0.2) !important; }
tr.duplicate-row td { background:rgba(245,158,11,0.12); }
tr.duplicate-row:hover td { background:rgba(245,158,11,0.2); }
td.outlier { background:rgba(239,68,68,0.3) !important; color:#fca5a5; }

/* ===== 右侧面板 ===== */
.right-panel {
  width:360px; min-width:360px;
  background:#0f1729; border-left:1px solid #1e3a5f;
  display:flex; flex-direction:column; padding:16px;
}
.right-panel h3 {
  font-size:0.9rem; color:#64748b; margin-bottom:12px;
  text-align:center; letter-spacing:2px;
  border-bottom:1px solid #1e3a5f; padding-bottom:8px;
}
.chart-section {
  flex:1; display:flex; flex-direction:column; gap:12px;
  overflow-y:auto;
}
.chart-box {
  flex:1; min-height:0;
  background:#111827; border:1px solid #1e3a5f; border-radius:8px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  overflow:hidden; position:relative; padding:8px;
}
.chart-box canvas { width:100%; height:100%; }
.chart-box .placeholder {
  color:#2a3a5c; font-size:0.85rem; text-align:center; line-height:1.6;
}
.chart-top { flex:1.5; }
.chart-middle { flex:2; }
.chart-bottom { flex:2; }

/* ===== 底部栏 ===== */
.bottom-bar {
  height:44px; min-height:44px;
  display:flex; align-items:center; justify-content:center;
  background: linear-gradient(135deg, #0f1729 0%, #1a2744 100%);
  border-top:1px solid #1e3a5f;
}
.bottom-bar__title {
  font-size:1.25rem; font-weight:600;
  color:#ffffff; letter-spacing:4px;
}

/* ===== 扫描线动画 ===== */
@keyframes scanline {
  0% { transform:translateY(-100%); }
  100% { transform:translateY(100vh); }
}
.scanline-overlay {
  position:fixed; top:0; left:0; right:0; height:2px;
  background:rgba(0,212,255,0.03);
  pointer-events:none; z-index:9999;
  animation:scanline 8s linear infinite;
}

@media (max-width:1200px) {
  .right-panel { width:280px; min-width:280px; }
}
@media (max-width:900px) {
  .mid-area { flex-direction:column; }
  .left-panel { width:100%; min-width:0; flex-direction:row; flex-wrap:wrap; padding:10px; border-right:none; border-bottom:1px solid #1e3a5f; }
  .btn-group { flex-direction:row; flex-wrap:wrap; }
  .btn { width:auto; padding:8px 14px; }
  .right-panel { width:100%; min-width:0; height:280px; border-left:none; border-top:1px solid #1e3a5f; }
}
</style>
</head>
<body>

<div class="scanline-overlay"></div>

<div class="app">

  <!-- ===== 顶部 ===== -->
  <header class="top-bar">
    <div class="top-bar__brand">
      <svg class="top-bar__icon" viewBox="0 0 30 38" width="36" height="47" fill="none">
        <path d="M6 11v16" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M6 10c7-7 16-3 16 4s-8 7-16 5" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M6 28c7 6 16 3 16-4s-8-7-16-5" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M7 11v16" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M10 19l13-11" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
        <path d="M10 19l13 11" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="top-bar__title">BroadTech System</span>
    </div>
  </header>

  <!-- ===== 中间 ===== -->
  <div class="mid-area">

    <!-- 左侧面板 -->
    <aside class="left-panel">
      <div class="dataset-selector">
        <label>▎数据集选择</label>
        <select id="datasetSelect">
          <option value="0">随机导入</option>
        </select>
      </div>
      <div class="btn-group">
        <button class="btn btn-import" onclick="stepImport()">📥 导入数据集</button>
        <button class="btn btn-preprocess" id="btnTime" onclick="stepTimePreprocess()" disabled>⏰ 时间预处理</button>
        <button class="btn btn-miss" id="btnMiss" onclick="highlightMiss()" disabled>🟢 缺失值处理</button>
        <button class="btn btn-dup" id="btnDup" onclick="highlightDup()" disabled>🟠 重复值处理</button>
        <button class="btn btn-outlier" id="btnOutlier" onclick="highlightOutlier()" disabled>🔴 异常值处理</button>
        <button class="btn btn-noise" id="btnNoise" onclick="stepNoiseFilter()" disabled>🌊 噪声滤波</button>
        <button class="btn btn-norm" id="btnNorm" onclick="stepNormalize()" disabled>📐 归一化处理</button>
        <button class="btn btn-export" id="btnExport" onclick="exportDataset()" disabled>💾 导出数据集</button>
      </div>
    </aside>

    <!-- 中间表格区 -->
    <section class="center-panel">
      <div class="table-toolbar">
        <div class="info">数据：<span id="tableInfo">未加载</span></div>
        <button class="toggle-scroll" id="scrollBtn" onclick="toggleScroll()">⏸ 暂停滚动</button>
      </div>
      <div class="table-wrapper" id="tableWrapper">
        <table id="dataTable"></table>
      </div>
    </section>

    <!-- 右侧图表区 -->
    <aside class="right-panel">
      <h3>▎数据质量概览</h3>
      <div class="chart-section">
        <div class="chart-box chart-top" id="chartAbnormal">
          <div class="placeholder">异常分布饼图<br><small>导入数据后显示</small></div>
          <canvas id="canvasAbnormal" style="display:none"></canvas>
        </div>
        <div class="chart-box chart-middle" id="chartNoise">
          <div class="placeholder">噪声滤波折线图<br><small>导入数据后显示</small></div>
          <canvas id="canvasNoise" style="display:none"></canvas>
        </div>
        <div class="chart-box chart-bottom" id="chartNorm">
          <div class="placeholder">归一化对比图<br><small>导入数据后显示</small></div>
          <canvas id="canvasNorm" style="display:none"></canvas>
        </div>
      </div>
    </aside>
  </div>

  <!-- ===== 底部 ===== -->
  <footer class="bottom-bar">
    <span class="bottom-bar__title">手搓数据 智驭未来</span>
  </footer>
</div>

<script>
// ====== 全局状态 ======
let currentHeaders = null;  // CSV列名数组
let currentRows = [];       // 原始数据（二维数组，字符串）
let parsedRows = [];        // 解析后的数据（数字/NaN转换后的值数组）
let missingPos = [];        // [[行,列],...] 缺失值位置
let outlierPos = [];        // [[行,列],...] 异常值位置
let duplicateRows = [];     // [行索引,...] 重复行（第2个及以后的副本）
let isScrolling = false;
let scrollTimer = null;
let highlightMode = 'none';
let STEP_FLAGS = {
  imported: false,
  timePreprocessed: false,
  missingProcessed: false,
  dupProcessed: false,
  outlierProcessed: false,
  noiseFiltered: false,
  normalized: false
};

// 关键列名（数据质量检测用）
const KEY_COLS = ['vibration_X', 'vibration_Z', 'noise_X', 'Grating_feedback_X', 'Grating_feedback_Y'];

function getColIndex(name) {
  if (!currentHeaders) return -1;
  return currentHeaders.indexOf(name);
}

(function initSelector() {
  const sel = document.getElementById('datasetSelect');
  for (let i = 1; i <= 20; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = '数据集 #' + i;
    sel.appendChild(opt);
  }
})();

// ====== CSV 加载与解析 ======
async function stepImport() {
  const sel = document.getElementById('datasetSelect');
  let dsId = parseInt(sel.value);
  if (dsId === 0) dsId = Math.floor(Math.random() * 20) + 1;

  document.getElementById('tableInfo').textContent = '加载中...';

  // 从GitHub仓库根目录获取CSV文件
  const csvName = 'uidata' + dsId + '#.csv';
  // #在URL中是片段标识符，需要编码
  const url = 'https://raw.githubusercontent.com/luomodeshang/UITest-UI/main/' + encodeURIComponent(csvName);

  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    parseAndLoadCSV(text);
    document.getElementById('tableInfo').textContent = '数据集 #' + dsId + ' | ' + currentRows.length + '行 x ' + currentHeaders.length + '列';
    document.getElementById('btnTime').disabled = false;
    sel.value = dsId;
  } catch (e) {
    document.getElementById('tableInfo').textContent = '❌ 加载失败: ' + csvName;
    alert('加载失败，请检查文件是否存在: ' + csvName + '\n' + e.message);
  }
}

function parseAndLoadCSV(text) {
  // 按行分割，处理换行符
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n').filter(l => l.trim() !== '');
  if (lines.length < 2) { alert('CSV文件行数不足'); return; }

  currentHeaders = parseCSVLine(lines[0]);
  currentRows = [];
  for (let i = 1; i < lines.length; i++) {
    currentRows.push(parseCSVLine(lines[i]));
  }

  // 确保每行列数一致
  const numCols = currentHeaders.length;
  currentRows = currentRows.map(row => {
    while (row.length < numCols) row.push('');
    return row.slice(0, numCols);
  });

  // 记录初始行列数
  window._initialRows = currentRows.length;
  window._initialCols = currentHeaders.length;

  // 解析数值
  parsedRows = currentRows.map(row => row.map(v => {
    const s = v.trim();
    if (s === '' || s.toUpperCase() === 'NAN' || s.toUpperCase() === 'N/A' || s.toUpperCase() === 'NULL') return NaN;
    const n = Number(s);
    return isNaN(n) ? NaN : n;
  }));

  // 检测所有异常
  detectAllAnomalies();
  renderTable();
  drawCharts();

  STEP_FLAGS.imported = true;
  document.getElementById('btnTime').disabled = false;

  // 重置流程
  STEP_FLAGS.timePreprocessed = false;
  STEP_FLAGS.missingProcessed = false;
  STEP_FLAGS.dupProcessed = false;
  STEP_FLAGS.outlierProcessed = false;
  STEP_FLAGS.noiseFiltered = false;
  STEP_FLAGS.normalized = false;
  document.getElementById('btnMiss').disabled = true;
  document.getElementById('btnDup').disabled = true;
  document.getElementById('btnOutlier').disabled = true;
  document.getElementById('btnNoise').disabled = true;
  document.getElementById('btnNorm').disabled = true;
  document.getElementById('btnExport').disabled = true;

  startScroll();
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQuotes && i + 1 < line.length && line[i + 1] === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (c === ',' && !inQuotes) {
      result.push(current);
      current = '';
    } else {
      current += c;
    }
  }
  result.push(current);
  return result;
}

// ====== 异常检测（三大类一次性检测） ======
function detectAllAnomalies() {
  missingPos = [];
  outlierPos = [];
  duplicateRows = [];

  // 1. 缺失值检测: 只在KEY_COLS中检测NaN
  const keyIndices = KEY_COLS.map(name => getColIndex(name)).filter(idx => idx >= 0);
  for (let r = 0; r < parsedRows.length; r++) {
    for (let ci of keyIndices) {
      if (isNaN(parsedRows[r][ci])) {
        missingPos.push([r, ci]);
      }
    }
  }

  // 2. 异常值检测: 对KEY_COLS每列计算mean±3σ
  for (let ci of keyIndices) {
    const vals = [];
    for (let r = 0; r < parsedRows.length; r++) {
      const v = parsedRows[r][ci];
      if (!isNaN(v)) vals.push(v);
    }
    if (vals.length < 3) continue;
    const mean = vals.reduce((a,b) => a+b, 0) / vals.length;
    const std = Math.sqrt(vals.reduce((a,b) => a + (b-mean)**2, 0) / vals.length);
    const lower = mean - 3 * std;
    const upper = mean + 3 * std;
    for (let r = 0; r < parsedRows.length; r++) {
      const v = parsedRows[r][ci];
      if (!isNaN(v) && (v < lower || v > upper)) {
        outlierPos.push([r, ci]);
      }
    }
  }

  // 3. 重复行检测：完全重复的行（基于原始字符串）
  const seen = {};
  for (let r = 0; r < currentRows.length; r++) {
    const key = currentRows[r].join('\x00');
    if (key in seen) {
      duplicateRows.push(r);
    } else {
      seen[key] = r;
    }
  }
}

// ====== 渲染表格 ======
function renderTable() {
  const table = document.getElementById('dataTable');
  table.innerHTML = '';
  if (!currentHeaders) return;

  // 表头
  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  const idxTh = document.createElement('th');
  idxTh.textContent = '行';
  headRow.appendChild(idxTh);
  currentHeaders.forEach(col => {
    const th = document.createElement('th');
    th.textContent = col;
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  table.appendChild(thead);

  // 表体
  const tbody = document.createElement('tbody');
  for (let r = 0; r < currentRows.length; r++) {
    const tr = document.createElement('tr');
    tr.dataset.rowIdx = r;

    // 行号
    const tdIdx = document.createElement('td');
    tdIdx.textContent = r;
    tr.appendChild(tdIdx);

    for (let c = 0; c < currentHeaders.length; c++) {
      const td = document.createElement('td');
      const v = parsedRows[r][c];
      const raw = currentRows[r][c].trim();

      if (raw === '' || raw.toUpperCase() === 'NAN') {
        td.textContent = 'NaN';
        td.classList.add('initial-anomaly', 'type-missing');
      } else if (!isNaN(v)) {
        td.textContent = Number.isInteger(v) ? v.toString() : v.toFixed(4);
      } else {
        td.textContent = raw;
      }

      // 异常值初始标红
      if (isOutlier(r, c)) {
        td.classList.add('initial-anomaly', 'type-outlier');
      }

      tr.appendChild(td);
    }

    // 重复行初始标红
    if (isDuplicateRow(r)) {
      tr.classList.add('initial-anomaly', 'type-dup');
    }

    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
}

function isOutlier(r, c) {
  return outlierPos.some(p => p[0] === r && p[1] === c);
}
function isMissing(r, c) {
  return missingPos.some(p => p[0] === r && p[1] === c);
}
function isDuplicateRow(r) {
  return duplicateRows.includes(r);
}

// ====== 异常检测（三大类一次性检测） ======
function detectAllAnomalies() {
  missingPos = [];
  outlierPos = [];
  duplicateRows = [];

  // 1. 缺失值检测: 只在KEY_COLS中检测NaN
  const keyIndices = KEY_COLS.map(name => getColIndex(name)).filter(idx => idx >= 0);
  for (let r = 0; r < parsedRows.length; r++) {
    for (let ci of keyIndices) {
      if (isNaN(parsedRows[r][ci])) {
        missingPos.push([r, ci]);
      }
    }
  }

  // 2. 异常值检测: 对KEY_COLS每列计算mean+/-3sigma
  for (let ci of keyIndices) {
    const vals = [];
    for (let r = 0; r < parsedRows.length; r++) {
      const v = parsedRows[r][ci];
      if (!isNaN(v)) vals.push(v);
    }
    if (vals.length < 3) continue;
    const mean = vals.reduce((a,b) => a+b, 0) / vals.length;
    const std = Math.sqrt(vals.reduce((a,b) => a + (b-mean)**2, 0) / vals.length);
    const lower = mean - 3 * std;
    const upper = mean + 3 * std;
    for (let r = 0; r < parsedRows.length; r++) {
      const v = parsedRows[r][ci];
      if (!isNaN(v) && (v < lower || v > upper)) {
        outlierPos.push([r, ci]);
      }
    }
  }

  // 3. 重复行检测
  const seen = {};
  for (let r = 0; r < currentRows.length; r++) {
    const key = currentRows[r].join('\x00');
    if (key in seen) {
      duplicateRows.push(r);
    } else {
      seen[key] = r;
    }
  }
}

// ====== 渲染表格 ======
function renderTable() {
  const table = document.getElementById('dataTable');
  table.innerHTML = '';
  if (!currentHeaders) return;

  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  const idxTh = document.createElement('th');
  idxTh.textContent = '行';
  headRow.appendChild(idxTh);
  currentHeaders.forEach(col => {
    const th = document.createElement('th');
    th.textContent = col;
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  for (let r = 0; r < currentRows.length; r++) {
    const tr = document.createElement('tr');
    tr.dataset.rowIdx = r;
    const tdIdx = document.createElement('td');
    tdIdx.textContent = r;
    tr.appendChild(tdIdx);

    for (let c = 0; c < currentHeaders.length; c++) {
      const td = document.createElement('td');
      const v = parsedRows[r][c];
      const raw = currentRows[r][c].trim();
      if (raw === '' || raw.toUpperCase() === 'NAN') {
        td.textContent = 'NaN';
        td.classList.add('initial-anomaly', 'type-missing');
      } else if (!isNaN(v)) {
        td.textContent = Number.isInteger(v) ? v.toString() : v.toFixed(4);
      } else {
        td.textContent = raw;
      }
      if (isOutlier(r, c)) td.classList.add('initial-anomaly', 'type-outlier');
      tr.appendChild(td);
    }
    if (isDuplicateRow(r)) tr.classList.add('initial-anomaly', 'type-dup');
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
}

function isOutlier(r, c) { return outlierPos.some(p => p[0] === r && p[1] === c); }
function isMissing(r, c) { return missingPos.some(p => p[0] === r && p[1] === c); }
function isDuplicateRow(r) { return duplicateRows.includes(r); }

// ====== 滚动控制 ======
function startScroll() {
  if (isScrolling) return;
  isScrolling = true;
  document.getElementById('scrollBtn').textContent = '⏸ 暂停滚动';
  document.getElementById('scrollBtn').classList.add('running');
  const wrapper = document.getElementById('tableWrapper');
  scrollTimer = setInterval(() => {
    wrapper.scrollTop += 1;
    if (wrapper.scrollTop >= wrapper.scrollHeight - wrapper.clientHeight) wrapper.scrollTop = 0;
  }, 25);
}
function stopScroll() {
  isScrolling = false;
  clearInterval(scrollTimer); scrollTimer = null;
  document.getElementById('scrollBtn').textContent = '▶ 开始滚动';
  document.getElementById('scrollBtn').classList.remove('running');
}
function toggleScroll() { if (isScrolling) stopScroll(); else startScroll(); }

// ====== 缺失值处理（绿色） ======
function highlightMiss() {
  highlightMode = 'miss';
  let minRow = Infinity;
  const rows = document.querySelectorAll('#dataTable tbody tr');
  rows.forEach((tr, idx) => {
    const tds = tr.querySelectorAll('td:not(:first-child)');
    tds.forEach((td, colIdx) => {
      if (isMissing(idx, colIdx)) {
        td.classList.remove('initial-anomaly');
        td.classList.add('missing');
        td.classList.add('highlighted');
        minRow = Math.min(minRow, idx);
      }
    });
  });
  if (minRow < Infinity) {
    const wrapper = document.getElementById('tableWrapper');
    const rowHeight = rows[0] ? rows[0].offsetHeight : 30;
    wrapper.scrollTop = Math.max(0, minRow * rowHeight - wrapper.clientHeight / 2);
    const tds = rows[minRow].querySelectorAll('td:not(:first-child)');
    for (let ci = 0; ci < tds.length; ci++) {
      if (isMissing(minRow, ci)) { wrapper.scrollLeft = tds[ci].offsetLeft - 60; break; }
    }
  }
  document.querySelectorAll('.btn-miss, .btn-dup, .btn-outlier').forEach(b => b.classList.remove('active'));
  document.getElementById('btnMiss').classList.add('active');
  STEP_FLAGS.missingProcessed = true;
  document.getElementById('btnDup').disabled = false;
  checkExportReady();
  stopScroll();
}

// ====== 重复值处理（删除重复行） ======
function highlightDup() {
  highlightMode = 'dup';
  const initRows = _initialRows || currentRows.length;
  const initCols = _initialCols || currentHeaders.length;

  // 删除重复行（从后往前删，避免索引错乱）
  const dupSet = new Set(duplicateRows);
  const sortedDups = [...dupSet].sort((a,b) => b - a);
  for (let r of sortedDups) {
    currentRows.splice(r, 1);
    parsedRows.splice(r, 1);
  }

  // 重置标记状态（行号已变，所有异常标记需要重算）
  missingPos = [];
  outlierPos = [];
  duplicateRows = [];
  STEP_FLAGS.missingProcessed = false;
  STEP_FLAGS.outlierProcessed = false;
  document.getElementById('btnMiss').disabled = true;
  document.getElementById('btnOutlier').disabled = true;

  // 重新检测
  detectAllAnomalies();
  renderTable();
  drawAbnormalChart();

  // 在tableInfo显示原始和当前信息
  const dsId = document.getElementById('datasetSelect').value || '1';
  document.getElementById('tableInfo').textContent =
    '数据集 #' + dsId + ' | 当前: ' + currentRows.length + '行 x ' + currentHeaders.length + '列 (原始: ' + initRows + '行 x ' + initCols + '列)';

  STEP_FLAGS.dupProcessed = true;
  document.getElementById('btnMiss').disabled = false;
  checkExportReady();
  stopScroll();
  document.querySelectorAll('.btn-miss, .btn-dup, .btn-outlier').forEach(b => b.classList.remove('active'));
  document.getElementById('btnDup').classList.add('active');
}

// ====== 饼图绘制 ======
function drawPie(canvasId, labels, values, colors, total) {
  const canvas = document.getElementById(canvasId);
  const container = canvas.parentElement;
  const placeholder = container.querySelector('.placeholder');
  if (placeholder) placeholder.style.display = 'none';
  canvas.style.display = 'block';

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = container.getBoundingClientRect();
  canvas.width = (rect.width - 16) * dpr;
  canvas.height = (rect.height - 16) * dpr;
  canvas.style.width = (rect.width - 16) + 'px';
  canvas.style.height = (rect.height - 16) + 'px';
  ctx.scale(dpr, dpr);

  const w = canvas.width / dpr, h = canvas.height / dpr;
  const cx = w / 2, cy = h / 2;
  const radius = Math.min(w, h) / 2 - 20;
  ctx.clearRect(0, 0, w, h);

  total = total || values.reduce((a,b) => a+b, 0) || 1;
  let startAngle = -Math.PI / 2;

  values.forEach((val, i) => {
    if (val === 0) return;
    const angle = (val / total) * 2 * Math.PI;
    const midAngle = startAngle + angle / 2;
    const pct = (val / total * 100);
    const displayPct = pct < 0.1 ? pct.toFixed(2) : pct.toFixed(1);

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, startAngle, startAngle + angle);
    ctx.closePath();
    ctx.fillStyle = colors[i];
    ctx.fill();
    ctx.strokeStyle = '#0d111d';
    ctx.lineWidth = 2;
    ctx.stroke();

    const labelRadius = radius * 0.65;
    const labelX = cx + Math.cos(midAngle) * labelRadius;
    const labelY = cy + Math.sin(midAngle) * labelRadius;
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(val, labelX, labelY - 10);
    ctx.font = '11px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText(displayPct + '%', labelX, labelY + 8);
    startAngle += angle;
  });

  ctx.fillStyle = '#e0e8f0';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(total, cx, cy - 10);
  ctx.fillStyle = '#64748b';
  ctx.font = '11px sans-serif';
  ctx.fillText('总行数', cx, cy + 8);

  const legendY = h - 10;
  let legendX = 10;
  ctx.font = '11px sans-serif';
  labels.forEach((label, i) => {
    if (values[i] === 0) return;
    const pct = (values[i] / total * 100);
    const pctStr = pct < 0.1 ? pct.toFixed(2) : pct.toFixed(1);
    const text = label + ': ' + values[i] + ' (' + pctStr + '%)';
    ctx.fillStyle = colors[i];
    ctx.fillRect(legendX, legendY - 5, 8, 8);
    ctx.fillStyle = '#94a3b8';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, legendX + 12, legendY);
    legendX += ctx.measureText(text).width + 20;
  });
}

// ====== 绘制异常分布饼图 ======
function drawAbnormalChart() {
  const total = currentRows.length;
  const dupCount = duplicateRows.length;
  const missCount = missingPos.length;
  const outCount = outlierPos.length;
  labels = ['重复行', '缺失值', '异常值', '正常'];
  values = [dupCount, missCount, outCount, total - dupCount - missCount - outCount];
  colors = ['#f59e0b', '#10b981', '#ef4444', '#2a3a5c'];
  drawPie('canvasAbnormal', labels, values, colors, total);
}

// ====== 时间预处理 ======
function stepTimePreprocess() {
  if (!currentHeaders || !currentRows.length) return;
  if (STEP_FLAGS.timePreprocessed) { alert('时间预处理已完成'); return; }

  const ci = getColIndex('creation_date');
  if (ci < 0) { alert('未找到 creation_date 列，跳过此步骤'); STEP_FLAGS.timePreprocessed = true; document.getElementById('btnMiss').disabled = false; return; }

  // 检测是否unix时间戳
  let validCount = 0;
  for (let r = 0; r < parsedRows.length; r++) {
    const v = parsedRows[r][ci];
    if (!isNaN(v) && v > 1e8 && v < 2e12) validCount++;
  }
  if (validCount < 10) { alert('creation_date 列不是有效unix时间戳，跳过'); STEP_FLAGS.timePreprocessed = true; document.getElementById('btnMiss').disabled = false; return; }

  // 转换: YYMMDD hhmmss.000 毫秒格式
  for (let r = 0; r < parsedRows.length; r++) {
    const v = parsedRows[r][ci];
    if (isNaN(v) || v < 1e8) continue;
    // creation_date是毫秒级带小数的时间戳（如1779172858.447）
    const ts = v; // 已经是秒级+毫秒
    const sec = Math.floor(ts);
    const ms = Math.round((ts - sec) * 1000);
    const d = new Date(sec * 1000);
    if (!isNaN(d.getTime())) {
      const yy = String(d.getFullYear());
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      const ss = String(d.getSeconds()).padStart(2, '0');
      currentRows[r][ci] = yy + '/' + mm + '/' + dd + ' ' + hh + ':' + min + ':' + ss + '.' + String(ms).padStart(3, '0');
      parsedRows[r][ci] = NaN; // 变为非数值
    }
  }

  STEP_FLAGS.timePreprocessed = true;
  currentHeaders[ci] = currentHeaders[ci] + ' (时间)';
  renderTable();
  // 定位到creation_date列居中
  setTimeout(() => {
    const wrapper = document.getElementById('tableWrapper');
    const headers = document.querySelectorAll('#dataTable thead th');
    for (let i = 0; i < headers.length; i++) {
      if (headers[i].textContent.includes('creation_date')) {
        wrapper.scrollLeft = Math.max(0, headers[i].offsetLeft - wrapper.clientWidth / 2 + headers[i].offsetWidth / 2);
        break;
      }
    }
  }, 100);

  document.getElementById('btnMiss').disabled = false;
  document.querySelectorAll('.btn-preprocess, .btn-miss, .btn-dup, .btn-outlier, .btn-noise, .btn-norm')
    .forEach(b => b.classList.remove('active'));
  document.getElementById('btnTime').classList.add('active');
  checkExportReady();
}

// ====== 噪声滤波图表 ======
let noiseFiltered = false;

function drawNoiseSignal() {
  const canvas = document.getElementById('canvasNoise');
  const container = document.getElementById('chartNoise');
  if (!canvas || !container) return;
  const placeholder = container.querySelector('.placeholder');
  if (placeholder) placeholder.style.display = 'none';
  canvas.style.display = 'block';

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = container.getBoundingClientRect();
  canvas.width = (rect.width - 16) * dpr;
  canvas.height = (rect.height - 16) * dpr;
  canvas.style.width = (rect.width - 16) + 'px';
  canvas.style.height = (rect.height - 16) + 'px';
  ctx.scale(dpr, dpr);

  const w = canvas.width / dpr, h = canvas.height / dpr;
  const padding = { top: 30, bottom: 25, left: 40, right: 20 };
  const plotW = w - padding.left - padding.right;
  const plotH = h - padding.top - padding.bottom;

  // 取211-329行的noise_X数据
  const ni = getColIndex('noise_X');
  if (ni < 0) return;
  const startRow = 210, endRow = Math.min(329, currentRows.length);
  const rawVals = [];
  for (let i = startRow; i < endRow; i++) {
    const v = parsedRows[i][ni];
    if (!isNaN(v)) rawVals.push(v);
  }
  if (rawVals.length < 2) return;

  const N = rawVals.length;

  // 移动平均滤波（窗口=5）
  const filteredVals = rawVals.map((_, i) => {
    let sum = 0, count = 0;
    for (let j = -2; j <= 2; j++) {
      const idx = i + j;
      if (idx >= 0 && idx < rawVals.length) { sum += rawVals[idx]; count++; }
    }
    return sum / count;
  });

  ctx.clearRect(0, 0, w, h);

  // 网格
  ctx.strokeStyle = 'rgba(30,58,95,0.5)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = padding.top + (plotH / 4) * i;
    ctx.beginPath(); ctx.moveTo(padding.left, y); ctx.lineTo(w - padding.right, y); ctx.stroke();
  }

  const dataMin = Math.min(...rawVals);
  const dataMax = Math.max(...rawVals);
  const yPad = (dataMax - dataMin) * 0.1 || 1;
  const yMin = dataMin - yPad, yRange = dataMax - dataMin + 2 * yPad;

  function mapX(i) { return padding.left + (i / (N - 1)) * plotW; }
  function mapY(y) { return padding.top + (1 - (y - yMin) / yRange) * plotH; }

  // 原始信号
  ctx.strokeStyle = 'rgba(148,163,184,0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  rawVals.forEach((v, i) => {
    const px = mapX(i), py = mapY(v);
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  });
  ctx.stroke();

  // 图例: 原始
  ctx.fillStyle = 'rgba(148,163,184,0.8)';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillRect(padding.left + 5, padding.top + 5, 12, 2);
  ctx.fillText('原始 noise_X', padding.left + 20, padding.top + 9);

  if (noiseFiltered) {
    // 滤波后
    ctx.strokeStyle = '#22d3ee';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    filteredVals.forEach((v, i) => {
      const px = mapX(i), py = mapY(v);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    });
    ctx.stroke();

    ctx.fillStyle = '#22d3ee';
    ctx.font = 'bold 11px sans-serif';
    ctx.fillRect(padding.left + 130, padding.top + 5, 12, 2.5);
    ctx.fillText('滤波后', padding.left + 145, padding.top + 9);

    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('噪声滤波 (移动平均, 窗口=5) - 已处理', w / 2, padding.top - 8);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('噪声滤波曲线', w / 2, padding.top - 8);
  }

  // Y轴
  ctx.fillStyle = '#64748b';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let i = 0; i <= 4; i++) {
    const v = yMin + (yRange / 4) * (4 - i);
    ctx.fillText(v.toFixed(1), padding.left - 5, padding.top + (plotH / 4) * i);
  }

  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  // X轴标签已删除
}

// ====== 归一化三线图 ======
function drawNormChart() {
  const canvas = document.getElementById('canvasNorm');
  const container = document.getElementById('chartNorm');
  if (!canvas || !container) return;
  const placeholder = container.querySelector('.placeholder');
  if (placeholder) placeholder.style.display = 'none';
  canvas.style.display = 'block';

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = container.getBoundingClientRect();
  canvas.width = (rect.width - 16) * dpr;
  canvas.height = (rect.height - 16) * dpr;
  canvas.style.width = (rect.width - 16) + 'px';
  canvas.style.height = (rect.height - 16) + 'px';
  ctx.scale(dpr, dpr);

  const w = canvas.width / dpr, h = canvas.height / dpr;
  const padding = { top: 30, bottom: 30, left: 45, right: 20 };
  const plotW = w - padding.left - padding.right;
  const plotH = h - padding.top - padding.bottom;

  ctx.clearRect(0, 0, w, h);

  // 网格
  ctx.strokeStyle = 'rgba(30,58,95,0.5)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = padding.top + (plotH / 4) * i;
    ctx.beginPath(); ctx.moveTo(padding.left, y); ctx.lineTo(w - padding.right, y); ctx.stroke();
  }

  // 获取三列数据(归一化前)
  const idxX = getColIndex('vibration_X');
  const idxZ = getColIndex('vibration_Z');
  const idxN = getColIndex('noise_X');
  if (idxX < 0 || idxZ < 0 || idxN < 0) return;

  function getSeries(colIdx) {
    const vals = [];
    for (let r = 0; r < parsedRows.length; r++) {
      const v = parsedRows[r][colIdx];
      if (!isNaN(v)) vals.push(v);
    }
    return vals;
  }

  const series = [
    { name: 'vibration_X', vals: getSeries(idxX), color: '#22d3ee' },
    { name: 'vibration_Z', vals: getSeries(idxZ), color: '#f59e0b' },
    { name: 'noise_X', vals: getSeries(idxN), color: '#ef4444' }
  ];

  // 所有值统一归一化到[0,1]
  let allVals = [];
  series.forEach(s => { allVals = allVals.concat(s.vals); });
  const globalMin = Math.min(...allVals);
  const globalMax = Math.max(...allVals);
  const globalRange = globalMax - globalMin || 1;

  const N = currentRows.length;

  function mapY(val) {
    const norm = (val - globalMin) / globalRange;
    return padding.top + (1 - norm) * plotH;
  }

  // 直接画: 用三个路径
  function drawSeries(colIdx, color, name) {
    const vals = [];
    for (let r = 0; r < currentRows.length; r++) {
      const v = parsedRows[r][colIdx];
      if (!isNaN(v)) vals.push(v);
    }
    if (vals.length < 2) return;

    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    let first = true;
    let xIdx = 0;
    for (let r = 0; r < currentRows.length; r++) {
      const v = parsedRows[r][colIdx];
      if (isNaN(v)) continue;
      const norm = (v - globalMin) / globalRange;
      const px = padding.left + (xIdx / (vals.length - 1)) * plotW;
      const py = padding.top + (1 - norm) * plotH;
      if (first) { ctx.moveTo(px, py); first = false; }
      else { ctx.lineTo(px, py); }
      xIdx++;
    }
    ctx.stroke();
  }

  drawSeries(idxX, '#22d3ee', 'vibration_X');
  drawSeries(idxZ, '#f59e0b', 'vibration_Z');
  drawSeries(idxN, '#ef4444', 'noise_X');

  // 图例
  const legendItems = [
    { name: 'vibration_X', color: '#22d3ee' },
    { name: 'vibration_Z', color: '#f59e0b' },
    { name: 'noise_X', color: '#ef4444' }
  ];
  let lx = padding.left + 5;
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  legendItems.forEach(item => {
    ctx.fillStyle = item.color;
    ctx.fillRect(lx, padding.top + 5, 12, 2.5);
    ctx.fillText(item.name, lx + 15, padding.top + 7);
    lx += ctx.measureText(item.name).width + 35;
  });

  // 标题
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('归一化对比 [' + globalMin.toFixed(1) + ' ~ ' + globalMax.toFixed(1) + '] → [0, 1]', w / 2, padding.top - 8);

  // Y轴标签
  ctx.fillStyle = '#64748b';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  [0, 0.25, 0.5, 0.75, 1].forEach((v, i) => {
    const y = padding.top + (plotH / 4) * i;
    ctx.fillText(v.toFixed(2), padding.left - 5, y);
  });

  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  // X轴标签已删除
}

// ====== 归一化处理（表格内数值替换为归一化值） ======
function stepNormalize() {
  if (!currentHeaders || !currentRows.length) return;
  if (STEP_FLAGS.normalized) { alert('归一化已完成'); return; }

  const idxX = getColIndex('vibration_X');
  const idxZ = getColIndex('vibration_Z');
  const idxN = getColIndex('noise_X');

  const colNames = [];
  const colIndices = [];
  if (idxX >= 0) { colIndices.push(idxX); colNames.push('vibration_X'); }
  if (idxZ >= 0) { colIndices.push(idxZ); colNames.push('vibration_Z'); }
  if (idxN >= 0) { colIndices.push(idxN); colNames.push('noise_X'); }

  if (colIndices.length === 0) { alert('未找到 vibration_X/vibration_Z/noise_X 列'); return; }

  // 收集所有有效值
  for (let ci of colIndices) {
    const vals = [];
    for (let r = 0; r < parsedRows.length; r++) {
      const v = parsedRows[r][ci];
      if (!isNaN(v)) vals.push(v);
    }
    if (vals.length < 2) continue;
    const colMin = Math.min(...vals);
    const colMax = Math.max(...vals);
    const range = colMax - colMin;
    if (range === 0) continue;

    for (let r = 0; r < parsedRows.length; r++) {
      const v = parsedRows[r][ci];
      if (!isNaN(v)) {
        const norm = (v - colMin) / range;
        currentRows[r][ci] = norm.toFixed(6);
        parsedRows[r][ci] = norm;
      }
    }
    currentHeaders[ci] = currentHeaders[ci] + ' (归一化)';
  }

  STEP_FLAGS.normalized = true;
  renderTable();
  checkExportReady();

  document.querySelectorAll('.btn-preprocess, .btn-miss, .btn-dup, .btn-outlier, .btn-noise, .btn-norm')
    .forEach(b => b.classList.remove('active'));
  document.getElementById('btnNorm').classList.add('active');
}

// ====== 图表重绘入口 ======
function drawCharts() {
  drawAbnormalChart();
  drawNoiseSignal();
  drawNormChart();
}

// ====== 导出 ======
function exportDataset() {
  if (document.getElementById('btnExport').disabled) { alert('请先完成所有步骤后再导出'); return; }

  let csv = currentHeaders.join(',') + '\n';
  currentRows.forEach(row => {
    csv += row.map(v => {
      const s = String(v);
      if (s.includes(',') || s.includes('"') || s.includes('\n')) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }).join(',') + '\n';
  });

  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'processed_data.csv';
  link.click();
  URL.revokeObjectURL(link);
  alert('CSV导出完成: ' + currentRows.length + '行');
}

// ====== 窗口resize重绘 ======
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (STEP_FLAGS.imported) drawCharts();
  }, 300);
});
</script>
