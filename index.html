<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BroadTech System · 数据质量监控平台 v4.0.4</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; }
body { background:#0a0e17; color:#e0e8f0; font-family:'Microsoft YaHei','PingFang SC',-apple-system,sans-serif; }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:#111827; }
::-webkit-scrollbar-thumb { background:#2a3a5c; border-radius:3px; }
::-webkit-scrollbar-corner { background:#111827; }
.app { height:100vh; display:flex; flex-direction:column; }
.top-bar { height:60px; min-height:60px; display:flex; align-items:center; justify-content:flex-start; background:linear-gradient(135deg,#0f1729 0%,#1a2744 100%); border-bottom:1px solid #1e3a5f; padding:0 24px; }
.top-bar__brand { display:flex; align-items:flex-end; margin-left:auto; margin-right:180px; }
.top-bar__icon { display:block; width:36px; height:47px; filter:drop-shadow(0 0 4px rgba(0,212,255,0.5)); }
.top-bar__title { font-size:.875rem; font-weight:400; color:#fff; letter-spacing:1px; margin-bottom:5px; }
.top-bar::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent 0%,#00d4ff 50%,transparent 100%); opacity:.6; }
.mid-area { flex:1; display:flex; overflow:hidden; background:#0d111d; }
.left-panel { width:200px; min-width:200px; background:#0f1729; border-right:1px solid #1e3a5f; display:flex; flex-direction:column; align-items:center; padding:16px 0; }
.dataset-selector { width:170px; margin-bottom:20px; }
.dataset-selector label { display:block; font-size:.75rem; color:#64748b; margin-bottom:6px; text-align:center; letter-spacing:1px; }
.dataset-selector select { width:100%; padding:8px 12px; background:#1a2236; color:#e0e8f0; border:1px solid #2a3a5c; border-radius:6px; font-size:.85rem; cursor:pointer; outline:none; transition:border-color .3s; }
.dataset-selector select:hover { border-color:#00d4ff; }
.dataset-selector select:focus { border-color:#0088ff; box-shadow:0 0 8px rgba(0,136,255,0.3); }
.btn-group { display:flex; flex-direction:column; gap:10px; width:170px; }
.btn { width:100%; padding:12px 0; background:linear-gradient(135deg,#1a2236,#1e2a45); border:1px solid #2a3a5c; border-radius:8px; color:#94a3b8; font-size:.85rem; cursor:pointer; transition:all .3s; text-align:center; letter-spacing:1px; position:relative; overflow:hidden; }
.btn:hover { border-color:#00d4ff; color:#fff; box-shadow:0 0 15px rgba(0,212,255,.15); transform:translateX(2px); }
.btn::before { content:''; position:absolute; left:0; top:0; width:3px; height:100%; background:#00d4ff; transform:scaleY(0); transition:transform .3s; }
.btn:hover::before { transform:scaleY(1); }
.btn:active { transform:scale(.97); }
.btn-import { border-left:3px solid #3b82f6; }
.btn-export { border-left:3px solid #8b5cf6; }
.btn-export:disabled { opacity:.4; cursor:not-allowed; transform:none; background:#1a2236; border-color:#1e3a5f; color:#475569; }
.btn-export:disabled::before { display:none; }
.btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }
.btn-import.active { background:rgba(59,130,246,.15); border-color:#3b82f6; color:#60a5fa; }
.btn-quality.active { background:rgba(6,182,212,.15); border-color:#06b6d4; color:#22d3ee; }
.btn-miss.active { background:rgba(16,185,129,.15); border-color:#10b981; color:#34d399; }
.btn-dup.active { background:rgba(245,158,11,.15); border-color:#f59e0b; color:#fbbf24; }
.btn-outlier.active { background:rgba(168,85,247,.15); border-color:#a855f7; color:#c084fc; }
.btn-preprocess.active { background:rgba(139,92,246,.15); border-color:#8b5cf6; color:#a78bfa; }
.btn-noise.active { background:rgba(34,211,238,.15); border-color:#22d3ee; color:#67e8f9; }
.btn-norm.active { background:rgba(251,191,36,.15); border-color:#fbbf24; color:#fcd34d; }
.center-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#0d111d; }
.table-toolbar { height:44px; min-height:44px; display:flex; align-items:center; justify-content:space-between; padding:0 16px; background:#111827; border-bottom:1px solid #1e3a5f; }
.table-toolbar .info { font-size:.8rem; color:#64748b; }
.table-toolbar .info span { color:#00d4ff; }
.toggle-scroll { padding:6px 16px; border-radius:6px; font-size:.8rem; cursor:pointer; background:#1a2236; color:#64748b; border:1px solid #2a3a5c; transition:all .3s; }
.toggle-scroll:hover { border-color:#00d4ff; color:#fff; }
.toggle-scroll.running { background:rgba(0,212,255,.1); border-color:#00d4ff; color:#00d4ff; }
.table-wrapper { flex:1; overflow:auto; position:relative; }
table { border-collapse:collapse; font-size:.78rem; width:max-content; }
thead { position:sticky; top:0; z-index:2; }
th { background:#1a2744; padding:6px 10px; white-space:nowrap; border:1px solid #1e3a5f; color:#94a3b8; font-weight:600; text-align:center; }
th:first-child { position:sticky; left:0; z-index:3; background:#1a2744; }
td { padding:5px 10px; white-space:nowrap; text-align:right; border:1px solid #1a2236; font-family:'Consolas','Courier New',monospace; transition:background .4s; }
td:first-child { position:sticky; left:0; z-index:1; background:#111827; color:#64748b; text-align:center; font-weight:500; }
tr:hover td { background:rgba(30,58,95,.5); }
tr:hover td:first-child { background:#1a2744; }
td.initial-anomaly { background:rgba(239,68,68,.25) !important; color:#fca5a5; }
tr.initial-anomaly td:not(:first-child) { background:rgba(239,68,68,.25) !important; color:#fca5a5; }
td.missing { background:rgba(16,185,129,.25) !important; color:#6ee7b7; }
td.duplicate { background:rgba(245,158,11,.2) !important; }
tr.duplicate-row td { background:rgba(245,158,11,.12); }
tr.duplicate-row:hover td { background:rgba(245,158,11,.2); }
td.outlier { background:rgba(239,68,68,.3) !important; color:#fca5a5; }
.right-panel { width:360px; min-width:360px; background:#0f1729; border-left:1px solid #1e3a5f; display:flex; flex-direction:column; padding:16px; }
.right-panel h3 { font-size:.9rem; color:#64748b; margin-bottom:12px; text-align:center; letter-spacing:2px; border-bottom:1px solid #1e3a5f; padding-bottom:8px; }
.chart-section { flex:1; display:flex; flex-direction:column; gap:12px; overflow-y:auto; }
.chart-box { flex:1; min-height:0; background:#111827; border:1px solid #1e3a5f; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; overflow:hidden; position:relative; padding:8px; }
.chart-box canvas { width:100%; height:100%; }
.chart-box .placeholder { color:#2a3a5c; font-size:.85rem; text-align:center; line-height:1.6; }
.chart-top { flex:1.5; }
.chart-middle { flex:2; }
.chart-bottom { flex:2; }
.bottom-bar { height:44px; min-height:44px; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#0f1729 0%,#1a2744 100%); border-top:1px solid #1e3a5f; }
.bottom-bar__title { font-size:1.25rem; font-weight:600; color:#fff; letter-spacing:4px; }
@keyframes scanline { 0% { transform:translateY(-100%); } 100% { transform:translateY(100vh); } }
.scanline-overlay { position:fixed; top:0; left:0; right:0; height:2px; background:rgba(0,212,255,.03); pointer-events:none; z-index:9999; animation:scanline 8s linear infinite; }
@media (max-width:1200px) { .right-panel { width:280px; min-width:280px; } }
@media (max-width:900px) {
  .mid-area { flex-direction:column; }
  .left-panel { width:100%; min-width:0; flex-direction:row; flex-wrap:wrap; padding:10px; border-right:none; border-bottom:1px solid #1e3a5f; }
  .btn-group { flex-direction:row; flex-wrap:wrap; }
  .btn { width:auto; padding:8px 14px; }
  .right-panel { width:100%; min-width:0; height:280px; border-left:none; border-top:1px solid #1e3a5f; }
}
</style>
</head>
<body>

<div class="scanline-overlay"></div>

<div class="app">

  <!-- ===== 顶部 ===== -->
  <header class="top-bar">
    <div class="top-bar__brand">
      <svg class="top-bar__icon" viewBox="0 0 30 38" width="36" height="47" fill="none">
        <path d="M6 11v16" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M6 10c7-7 16-3 16 4s-8 7-16 5" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M6 28c7 6 16 3 16-4s-8-7-16-5" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M7 11v16" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M10 19l13-11" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
        <path d="M10 19l13 11" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="top-bar__title">BroadTech System</span>
    </div>
  </header>

  <!-- ===== 中间 ===== -->
  <div class="mid-area">

    <!-- 左侧面板 -->
    <aside class="left-panel">
      <div class="dataset-selector">
        <label>▎数据集选择</label>
        <select id="datasetSelect">
          <option value="0">随机导入</option>
        </select>
      </div>
      <div class="btn-group">
        <button class="btn btn-import" onclick="stepImport()">📥 导入数据集</button>
        <button class="btn btn-quality" id="btnQuality" onclick="stepQualityReport()" disabled>📊 数据质量报告</button>
        <button class="btn btn-preprocess" id="btnTime" onclick="stepTimePreprocess()" disabled>⏰ 时间预处理</button>
        <button class="btn btn-miss" id="btnMiss" onclick="highlightMiss()" disabled>🟢 缺失值处理</button>
        <button class="btn btn-dup" id="btnDup" onclick="highlightDup()" disabled>🟠 重复值处理</button>
        <button class="btn btn-outlier" id="btnOutlier" onclick="highlightOutlier()" disabled>🟣 异常值处理</button>
        <button class="btn btn-noise" id="btnNoise" onclick="stepNoiseFilter()" disabled>🌊 噪声滤波</button>
        <button class="btn btn-norm" id="btnNorm" onclick="stepNormalize()" disabled>📐 归一化处理</button>
        <button class="btn btn-export" id="btnExport" onclick="exportDataset()" disabled>💾 导出数据集</button>
      </div>
    </aside>

    <!-- 中间表格区 -->
    <section class="center-panel">
      <div class="table-toolbar">
        <div class="info">数据：<span id="tableInfo">未加载</span></div>
        <button class="toggle-scroll" id="scrollBtn" onclick="toggleScroll()">⏸ 暂停滚动</button>
      </div>
      <div class="table-wrapper" id="tableWrapper">
        <table id="dataTable"></table>
      </div>
    </section>

    <!-- 右侧图表区 -->
    <aside class="right-panel">
      <h3>▎数据质量报告</h3>
      <div class="chart-section">
        <div class="chart-box chart-top" id="chartAbnormal">
          <div class="placeholder">异常分布<br><small>导入数据后显示</small></div>
          <div class="abnormal-layout" id="abnormalLayout" style="display:none;width:100%;height:100%;position:relative;">
            <div class="abnormal-pie" id="pieContainer" style="position:absolute;left:0;top:0;width:45%;height:100%;">
              <canvas id="canvasAbnormal" style="width:100%;height:100%;"></canvas>
            </div>
            <div class="abnormal-legend" id="legendContainer" style="position:absolute;right:5px;top:10px;width:50%;height:calc(100% - 20px);display:flex;flex-direction:column;justify-content:center;gap:6px;">
              <div class="legend-item" data-type="dup" style="display:none;font-size:0.75rem;color:#94a3b8;padding:2px 8px;"><span class="legend-dot" style="display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle;"></span><span class="legend-label"></span><span class="legend-val" style="color:#e0e8f0;font-weight:600;margin-left:4px;"></span><span class="legend-pct" style="color:#64748b;margin-left:2px;"></span></div>
              <div class="legend-item" data-type="miss" style="display:none;font-size:0.75rem;color:#94a3b8;padding:2px 8px;"><span class="legend-dot" style="display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle;"></span><span class="legend-label"></span><span class="legend-val" style="color:#e0e8f0;font-weight:600;margin-left:4px;"></span><span class="legend-pct" style="color:#64748b;margin-left:2px;"></span></div>
              <div class="legend-item" data-type="outlier" style="display:none;font-size:0.75rem;color:#94a3b8;padding:2px 8px;"><span class="legend-dot" style="display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle;"></span><span class="legend-label"></span><span class="legend-val" style="color:#e0e8f0;font-weight:600;margin-left:4px;"></span><span class="legend-pct" style="color:#64748b;margin-left:2px;"></span></div>
              <div class="legend-item" data-type="normal" style="font-size:0.75rem;color:#94a3b8;padding:2px 8px;"><span class="legend-dot" style="display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle;"></span><span class="legend-label"></span><span class="legend-val" style="color:#e0e8f0;font-weight:600;margin-left:4px;"></span><span class="legend-pct" style="color:#64748b;margin-left:2px;"></span></div>
            </div>
          </div>
        </div>
        <div class="chart-box chart-middle" id="chartNoise">
          <div class="placeholder">噪声滤波折线图<br><small>导入数据后显示</small></div>
          <canvas id="canvasNoise" style="display:none"></canvas>
        </div>
        <div class="chart-box chart-bottom" id="chartNorm">
          <div class="placeholder">归一化处理<br><small>导入数据后显示</small></div>
          <canvas id="canvasNorm" style="display:none"></canvas>
        </div>
      </div>
    </aside>
  </div>

  <!-- ===== 底部 ===== -->
  <footer class="bottom-bar">
    <span class="bottom-bar__title">手搓数据 智驭未来</span>
  </footer>
</div>

<script>
// ====== 全局状态 ======
let currentHeaders = null;  // CSV列名数组
let currentRows = [];       // 原始数据（二维数组，字符串）
let parsedRows = [];        // 解析后的数据（数字/NaN转换后的值数组）
let missingPos = [];        // [[行,列],...] 缺失值位置
let outlierPos = [];        // [[行,列],...] 异常值位置
let duplicateRows = [];     // [行索引,...] 重复行（第2个及以后的副本）
let isScrolling = false;
let scrollTimer = null;
let highlightMode = 'none';
let STEP_FLAGS = {
  imported: false,
  timePreprocessed: false,
  missingProcessed: false,
  dupProcessed: false,
  outlierProcessed: false,
  noiseFiltered: false,
  normalized: false
};

// 三击制阶段变量：0=未点击，1=已定位，2=已处理，3+=跳转
let _missStage = 0;
let _dupStage = 0;
let _outlierStage = 0;
let _timeStage = 0;
let _firstDupRow = -1;  // 记录第一个被删除的重复行位置

// 关键列名（数据质量检测用）
const KEY_COLS = ['vibration_X', 'vibration_Z', 'noise_X', 'Grating_feedback_X', 'Grating_feedback_Y'];
// DOM 引用（缓存）
const $ = id => document.getElementById(id);
const $$ = sel => document.querySelectorAll(sel);
const _wrapper = $('tableWrapper');
const _scrollBtn = $('scrollBtn');
const _tableInfo = $('tableInfo');
const _btnMiss = $('btnMiss');
const _btnDup = $('btnDup');
const _btnOutlier = $('btnOutlier');
const _btnExport = $('btnExport');
const _btnNoise = $('btnNoise');
const _btnNorm = $('btnNorm');
const _btnQuality = $('btnQuality');
const _btnTime = $('btnTime');
const _datasetSelect = $('datasetSelect');
const _table = $('dataTable');


function getColIndex(name) {
  if (!currentHeaders) return -1;
  return currentHeaders.indexOf(name);
}

(function initSelector() {
  const sel = _datasetSelect;
  for (let i = 1; i <= 20; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = '数据集 #' + i;
    sel.appendChild(opt);
  }
})();

// ====== CSV 加载与解析 ======
async function stepImport() {
  const sel = _datasetSelect;
  let dsId = parseInt(sel.value);
  if (dsId === 0) dsId = Math.floor(Math.random() * 20) + 1;

  _tableInfo.textContent = '加载中...';

  const csvName = 'uidata' + dsId + '#.csv';
  // 从Pages同域获取CSV文件（避免raw.githubusercontent.com网络慢）
  const url = './' + encodeURIComponent(csvName);

  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    parseAndLoadCSV(text);
    _tableInfo.textContent = '数据集 #' + dsId + ' | ' + currentRows.length + '行 x ' + currentHeaders.length + '列';
    sel.value = dsId;
  } catch (e) {
    _tableInfo.textContent = '❌ 加载失败: ' + csvName;
    alert('加载失败，请检查文件是否存在: ' + csvName + '\n' + e.message);
  }
}

function parseAndLoadCSV(text) {
  // 按行分割，处理换行符
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n').filter(l => l.trim() !== '');
  if (lines.length < 2) { alert('CSV文件行数不足'); return; }

  currentHeaders = parseCSVLine(lines[0]);
  currentRows = [];
  for (let i = 1; i < lines.length; i++) {
    currentRows.push(parseCSVLine(lines[i]));
  }

  // 确保每行列数一致
  const numCols = currentHeaders.length;
  currentRows = currentRows.map(row => {
    while (row.length < numCols) row.push('');
    return row.slice(0, numCols);
  });

  // 记录初始行列数
  window._initialRows = currentRows.length;
  window._initialCols = currentHeaders.length;

  // 解析数值
  parsedRows = currentRows.map(row => row.map(v => {
    const s = v.trim();
    if (s === '' || s.toUpperCase() === 'NAN' || s.toUpperCase() === 'N/A' || s.toUpperCase() === 'NULL') return NaN;
    const n = Number(s);
    return isNaN(n) ? NaN : n;
  }));

  // 检测所有异常
  detectAllAnomalies();
  renderTable();
  // drawCharts() deferred to stepQualityReport()

  STEP_FLAGS.imported = true;
  _btnQuality.disabled = false;

  // 重置流程
  STEP_FLAGS.timePreprocessed = false;
  STEP_FLAGS.missingProcessed = false;
  STEP_FLAGS.dupProcessed = false;
  STEP_FLAGS.outlierProcessed = false;
  STEP_FLAGS.noiseFiltered = false;
  STEP_FLAGS.normalized = false;
  _missStage = 0;
  _dupStage = 0;
  _outlierStage = 0;
  _timeStage = 0;
  _firstDupRow = -1;
  _btnMiss.disabled = true;
  _btnDup.disabled = true;
  _btnOutlier.disabled = true;
  _btnNoise.disabled = true;
  _btnNorm.disabled = true;
  _btnExport.disabled = true;

  startScroll();
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQuotes && i + 1 < line.length && line[i + 1] === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (c === ',' && !inQuotes) {
      result.push(current);
      current = '';
    } else {
      current += c;
    }
  }
  result.push(current);
  return result;
}

// ====== 异常检测（三大类一次性检测） ======
function detectAllAnomalies() {
  missingPos = [];
  outlierPos = [];
  duplicateRows = [];

  // 1. 缺失值检测: 只在KEY_COLS中检测NaN
  let keyIndices = KEY_COLS.map(name => getColIndex(name)).filter(idx => idx >= 0);
  for (let r = 0; r < parsedRows.length; r++) {
    for (let ci of keyIndices) {
      if (isNaN(parsedRows[r][ci])) {
        missingPos.push([r, ci]);
      }
    }
  }

  // 2. 异常值检测: 对KEY_COLS每列计算mean+/-3sigma
  for (let ci of keyIndices) {
    const vals = [];
    for (let r = 0; r < parsedRows.length; r++) {
      const v = parsedRows[r][ci];
      if (!isNaN(v)) vals.push(v);
    }
    if (vals.length < 3) continue;
    const mean = vals.reduce((a,b) => a+b, 0) / vals.length;
    const std = Math.sqrt(vals.reduce((a,b) => a + (b-mean)**2, 0) / vals.length);
    const lower = mean - 3 * std;
    const upper = mean + 3 * std;
    for (let r = 0; r < parsedRows.length; r++) {
      const v = parsedRows[r][ci];
      if (!isNaN(v) && (v < lower || v > upper)) {
        outlierPos.push([r, ci]);
      }
    }
  }

  // 3. 重复行检测
  const seen = {};
  for (let r = 0; r < currentRows.length; r++) {
    const key = currentRows[r].join('\x00');
    if (key in seen) {
      duplicateRows.push(r);
    } else {
      seen[key] = r;
    }
  }
}

// ====== 渲染表格 ======
function renderTable() {
  const table = _table;
  table.innerHTML = '';
  if (!currentHeaders) return;

  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  const idxTh = document.createElement('th');
  idxTh.textContent = '行';
  headRow.appendChild(idxTh);
  currentHeaders.forEach(col => {
    const th = document.createElement('th');
    th.textContent = col;
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  for (let r = 0; r < currentRows.length; r++) {
    const tr = document.createElement('tr');
    tr.dataset.rowIdx = r;
    const tdIdx = document.createElement('td');
    tdIdx.textContent = r;
    tr.appendChild(tdIdx);

    for (let c = 0; c < currentHeaders.length; c++) {
      const td = document.createElement('td');
      const v = parsedRows[r][c];
      const raw = currentRows[r][c].trim();
      if (raw === '' || raw.toUpperCase() === 'NAN') {
        td.textContent = 'NaN';
        td.classList.add('initial-anomaly', 'type-missing');
      } else if (!isNaN(v)) {
        td.textContent = Number.isInteger(v) ? v.toString() : v.toFixed(4);
      } else {
        td.textContent = raw;
      }
      if (isOutlier(r, c)) td.classList.add('initial-anomaly', 'type-outlier');
      tr.appendChild(td);
    }
    if (isDuplicateRow(r)) tr.classList.add('initial-anomaly', 'type-dup');
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
}

function isOutlier(r, c) { return outlierPos.some(p => p[0] === r && p[1] === c); }
function isMissing(r, c) { return missingPos.some(p => p[0] === r && p[1] === c); }
function isDuplicateRow(r) { return duplicateRows.includes(r); }

// ====== 滚动控制 ======
function startScroll() {
  if (isScrolling) return;
  isScrolling = true;
  _scrollBtn.textContent = '⏸ 暂停滚动';
  _scrollBtn.classList.add('running');
  const wrapper = _wrapper;
  scrollTimer = setInterval(() => {
    wrapper.scrollTop += 1;
    if (wrapper.scrollTop >= wrapper.scrollHeight - wrapper.clientHeight) wrapper.scrollTop = 0;
  }, 25);
}
function stopScroll() {
  isScrolling = false;
  clearInterval(scrollTimer); scrollTimer = null;
  _scrollBtn.textContent = '▶ 开始滚动';
  _scrollBtn.classList.remove('running');
}
function toggleScroll() { if (isScrolling) stopScroll(); else startScroll(); }

// ====== 缺失值处理（绿色） ======
function highlightMiss() {
  highlightMode = 'miss';

  // ====== 第1次点击：定位到第一个缺失值 ======
  if (_missStage === 0) {
    let minRow = Infinity;
    const rows = $$('#dataTable tbody tr');
    rows.forEach((tr, idx) => {
      const tds = tr.querySelectorAll('td:not(:first-child)');
      tds.forEach((td, colIdx) => {
        if (isMissing(idx, colIdx)) {
          td.classList.remove('initial-anomaly');
          td.classList.add('missing');
          td.classList.add('highlighted');
          minRow = Math.min(minRow, idx);
        }
      });
    });
    if (minRow < Infinity) {
      const wrapper = _wrapper;
      const rowHeight = rows[0] ? rows[0].offsetHeight : 30;
      wrapper.scrollTop = Math.max(0, minRow * rowHeight - wrapper.clientHeight / 2);
      const tds = rows[minRow].querySelectorAll('td:not(:first-child)');
      for (let ci = 0; ci < tds.length; ci++) {
        if (isMissing(minRow, ci)) { wrapper.scrollLeft = tds[ci].offsetLeft - 60; break; }
      }
      _missStage = 1;
      $$('.btn-miss,.btn-dup,.btn-outlier').forEach(b => b.classList.remove('active'));
      _btnMiss.classList.add('active');
      stopScroll();
    } else {
      alert('没有找到缺失值');
    }
    return;
  }

  // ====== 第2次点击：前一行填充缺失值 ======
  if (_missStage === 1) {
    const keyIndices = KEY_COLS.map(name => getColIndex(name)).filter(idx => idx >= 0);
    for (let r = 0; r < parsedRows.length; r++) {
      for (let ci of keyIndices) {
        if (isMissing(r, ci)) {
          // 取前一行同一列的值填充（如果前一行不存在或也是NaN，继续往前找）
          let fillVal = NaN;
          for (let pr = r - 1; pr >= 0; pr--) {
            if (!isNaN(parsedRows[pr][ci])) {
              fillVal = parsedRows[pr][ci];
              break;
            }
          }
          if (!isNaN(fillVal)) {
            parsedRows[r][ci] = fillVal;
            currentRows[r][ci] = String(fillVal);
          }
        }
      }
    }
    // 标记被填充的单元格（保留绿色背景）
    const filledCells = [];
    for (let r = 0; r < parsedRows.length; r++) {
      for (let ci of keyIndices) {
        if (isMissing(r, ci)) filledCells.push([r, ci]);
      }
    }

    // 重新检测（排除已填充的缺失值）
    const prevMissing = missingPos.slice();
    outlierPos = [];
    duplicateRows = [];
    // 只重新检测异常值和重复行
    const oldMissing = missingPos;
    missingPos = [];
    const keyIndices2 = KEY_COLS.map(name => getColIndex(name)).filter(idx => idx >= 0);
    for (let ci of keyIndices2) {
      const vals = [];
      for (let r = 0; r < parsedRows.length; r++) {
        const v = parsedRows[r][ci];
        if (!isNaN(v)) vals.push(v);
      }
      if (vals.length < 3) continue;
      const mean = vals.reduce((a,b) => a+b, 0) / vals.length;
      const std = Math.sqrt(vals.reduce((a,b) => a + (b-mean)**2, 0) / vals.length);
      const lower = mean - 3 * std;
      const upper = mean + 3 * std;
      for (let r = 0; r < parsedRows.length; r++) {
        const v = parsedRows[r][ci];
        if (!isNaN(v) && (v < lower || v > upper)) outlierPos.push([r, ci]);
      }
    }
    // 重复行检测
    const seen = {};
    for (let r = 0; r < currentRows.length; r++) {
      const key = currentRows[r].join('\x00');
      if (key in seen) duplicateRows.push(r);
      else seen[key] = r;
    }

    renderTable();

    // 给被填充的单元格添加绿色背景
    const tableRows = $$('#dataTable tbody tr');
    filledCells.forEach(([r, ci]) => {
      if (tableRows[r]) {
        const tds = tableRows[r].querySelectorAll('td:not(:first-child)');
        if (tds[ci]) {
          tds[ci].classList.add('missing');
          tds[ci].classList.add('highlighted');
        }
      }
    });

    // 饼图对应数据清零
    drawAbnormalChart();
    _missStage = 2;
    STEP_FLAGS.missingProcessed = true;
    _btnDup.disabled = false;
    checkExportReady();
    $$('.btn-miss,.btn-dup,.btn-outlier').forEach(b => b.classList.remove('active'));
    _btnMiss.classList.add('active');
    stopScroll();
    alert('缺失值已用前一行数据填充');
    return;
  }

  // ====== 第3次及以后：跳转到第一个缺失值所在列 ======
  if (_missStage >= 2) {
    // 定位到缺失值所在列居中
    const headers = $$('#dataTable thead th');
    const ci = KEY_COLS[0]; // 第一个关键列（vibration_X）
    for (let i = 0; i < headers.length; i++) {
      if (headers[i].textContent.includes(currentHeaders[ci])) {
        _wrapper.scrollLeft = Math.max(0, headers[i].offsetLeft - _wrapper.clientWidth / 2 + headers[i].offsetWidth / 2);
        break;
      }
    }
    _wrapper.scrollTop = 0;
    stopScroll();
  }
}

// ====== 重复值处理（删除重复行） ======
function highlightDup() {
  highlightMode = 'dup';
  const initRows = _initialRows || currentRows.length;
  const initCols = _initialCols || currentHeaders.length;

  // ====== 第1次点击：定位到第一个重复行 ======
  if (_dupStage === 0) {
    if (duplicateRows.length === 0) { alert('没有找到重复行'); return; }
    const firstDup = Math.min(...duplicateRows);
    _firstDupRow = firstDup;
    const wrapper = _wrapper;
    const rows = $$('#dataTable tbody tr');
    if (rows.length > 0 && rows[firstDup]) {
      const rowHeight = rows[0].offsetHeight || 30;
      wrapper.scrollTop = Math.max(0, firstDup * rowHeight - wrapper.clientHeight / 2);
    }
    // 高亮显示重复行
    rows.forEach((tr, idx) => {
      if (isDuplicateRow(idx)) {
        tr.classList.add('duplicate-row');
      }
    });
    _dupStage = 1;
    $$('.btn-miss,.btn-dup,.btn-outlier').forEach(b => b.classList.remove('active'));
    _btnDup.classList.add('active');
    stopScroll();
    return;
  }

  // ====== 第2次点击：物理删除重复行 ======
  if (_dupStage === 1) {
    const dupSet = new Set(duplicateRows);
    const sortedDups = [...dupSet].sort((a,b) => b - a);
    const deletePos = sortedDups.length > 0 ? sortedDups[sortedDups.length - 1] : 0;

    for (let r of sortedDups) {
      currentRows.splice(r, 1);
      parsedRows.splice(r, 1);
    }

    // 重置标记状态
    missingPos = [];
    outlierPos = [];
    duplicateRows = [];
    STEP_FLAGS.missingProcessed = false;
    STEP_FLAGS.outlierProcessed = false;
    _btnMiss.disabled = true;
    _btnOutlier.disabled = true;

    // 重新检测
    detectAllAnomalies();
    renderTable();
    drawAbnormalChart();

    // 显示原始和当前信息
    const dsId = _datasetSelect.value || '1';
    _tableInfo.textContent =
      '数据集 #' + dsId + ' | 当前: ' + currentRows.length + '行 x ' + currentHeaders.length + '列 (原始: ' + initRows + '行 x ' + initCols + '列)';

    _dupStage = 2;
    _firstDupRow = Math.min(_firstDupRow, currentRows.length - 1);
    STEP_FLAGS.dupProcessed = true;
    _btnMiss.disabled = false;
    _btnOutlier.disabled = false;
    checkExportReady();
    $$('.btn-miss,.btn-dup,.btn-outlier').forEach(b => b.classList.remove('active'));
    _btnDup.classList.add('active');
    stopScroll();
    alert('已删除 ' + sortedDups.length + ' 行重复数据');
    return;
  }

  // ====== 第3次及以后：跳转到之前删除行的位置 ======
  if (_dupStage >= 2) {
    const wrapper = _wrapper;
    const rows = $$('#dataTable tbody tr');
    if (rows.length > 0) {
      const targetRow = Math.min(_firstDupRow, rows.length - 1);
      const rowHeight = rows[0].offsetHeight || 30;
      wrapper.scrollTop = Math.max(0, targetRow * rowHeight - wrapper.clientHeight / 2);
      // 高亮该行
      rows[targetRow].style.background = 'rgba(245,158,11,0.08)';
      setTimeout(() => { rows[targetRow].style.background = ''; }, 1500);
    }
    stopScroll();
  }
}

// ====== 异常值处理（三击制：定位→中值填充→跳转） ======
function highlightOutlier() {
  highlightMode = 'outlier';

  // ====== 第1次点击：定位到第一个异常值 ======
  if (_outlierStage === 0) {
    let minRow = Infinity;
    let minCol = -1;
    const rows = $$('#dataTable tbody tr');
    rows.forEach((tr, idx) => {
      const tds = tr.querySelectorAll('td:not(:first-child)');
      tds.forEach((td, colIdx) => {
        if (isOutlier(idx, colIdx)) {
          td.classList.remove('initial-anomaly');
          td.style.backgroundColor = 'rgba(168,85,247,0.3)';
          td.classList.add('highlighted');
          if (idx < minRow) { minRow = idx; minCol = colIdx; }
        }
      });
    });
    if (minRow < Infinity) {
      const wrapper = _wrapper;
      const rowHeight = rows[0] ? rows[0].offsetHeight : 30;
      wrapper.scrollTop = Math.max(0, minRow * rowHeight - wrapper.clientHeight / 2);
      scrolling = false;
      const tds = rows[minRow].querySelectorAll('td:not(:first-child)');
      for (let ci = 0; ci < tds.length; ci++) {
        if (isOutlier(minRow, ci)) { wrapper.scrollLeft = tds[ci].offsetLeft - 60; break; }
      }
      _outlierStage = 1;
      $$('.btn-miss,.btn-dup,.btn-outlier').forEach(b => b.classList.remove('active'));
      _btnOutlier.classList.add('active');
      stopScroll();
    } else {
      alert('没有找到异常值');
    }
    return;
  }

  // ====== 第2次点击：中值填充异常值 ======
  if (_outlierStage === 1) {
    const keyIndices = KEY_COLS.map(name => getColIndex(name)).filter(idx => idx >= 0);
    for (let ci of keyIndices) {
      // 收集该列所有正常值（非NaN且非异常值）
      const vals = [];
      for (let r = 0; r < parsedRows.length; r++) {
        if (!isNaN(parsedRows[r][ci]) && !isOutlier(r, ci)) {
          vals.push(parsedRows[r][ci]);
        }
      }
      if (vals.length < 3) continue;
      // 计算中位数
      vals.sort((a,b) => a - b);
      const mid = Math.floor(vals.length / 2);
      const median = vals.length % 2 === 0 ? (vals[mid-1] + vals[mid]) / 2 : vals[mid];

      // 填充异常值
      for (let r = 0; r < parsedRows.length; r++) {
        if (isOutlier(r, ci)) {
          parsedRows[r][ci] = median;
          currentRows[r][ci] = median.toFixed(4);
        }
      }
    }

    // 重新检测并重绘
    outlierPos = [];
    missingPos = [];
    duplicateRows = [];
    detectAllAnomalies();
    renderTable();
    drawAbnormalChart();

    _outlierStage = 2;
    STEP_FLAGS.outlierProcessed = true;
    _btnNoise.disabled = false;
    checkExportReady();
    $$('.btn-miss,.btn-dup,.btn-outlier').forEach(b => b.classList.remove('active'));
    _btnOutlier.classList.add('active');
    stopScroll();
    alert('异常值已用中位数填充');
    return;
  }

  // ====== 第3次及以后：跳转到异常值所在列居中 ======
  if (_outlierStage >= 2) {
    const headers = $$('#dataTable thead th');
    const ci = KEY_COLS[0]; // 第一个关键列
    for (let i = 0; i < headers.length; i++) {
      if (headers[i].textContent.includes(currentHeaders[ci])) {
        _wrapper.scrollLeft = Math.max(0, headers[i].offsetLeft - _wrapper.clientWidth / 2 + headers[i].offsetWidth / 2);
        break;
      }
    }
    _wrapper.scrollTop = 0;
    stopScroll();
  }
}

// ====== 检查导出就绪 ======
function checkExportReady() {
  const ready = STEP_FLAGS.timePreprocessed && STEP_FLAGS.missingProcessed &&
                STEP_FLAGS.dupProcessed && STEP_FLAGS.outlierProcessed &&
                STEP_FLAGS.noiseFiltered && STEP_FLAGS.normalized;
  _btnExport.disabled = !ready;
}

function drawAbnormalChart() {
  const dupCount = duplicateRows.length;
  const missCount = missingPos.length;
  const outCount = outlierPos.length;
  const total = currentRows.length;
  const normalCount = total > 0 ? total - dupCount - outCount : 0;

  // 显示布局容器
  const layout = document.getElementById('abnormalLayout');
  const placeholder = document.getElementById('chartAbnormal').querySelector('.placeholder');
  if (placeholder) placeholder.style.display = 'none';
  if (layout) layout.style.display = 'block';

  // 更新右侧文本信息
  const items = [
    { type: 'dup',  label: '重复值',  val: dupCount,  color: '#f59e0b' },
    { type: 'miss',  label: '缺失值',  val: missCount, color: '#10b981' },
    { type: 'outlier', label: '异常值', val: outCount,  color: '#ef4444' },
    { type: 'normal', label: '正常',    val: normalCount, color: '#2a3a5c' }
  ];

  items.forEach(item => {
    const el = document.querySelector('.legend-item[data-type="' + item.type + '"]');
    if (!el) return;
    el.style.display = item.val > 0 || item.type === 'normal' ? 'flex' : 'none';
    el.querySelector('.legend-dot').style.background = item.color;
    el.querySelector('.legend-label').textContent = item.label;
    el.querySelector('.legend-val').textContent = item.val;
    const pct = total > 0 ? (item.val / total * 100) : 0;
    const pctStr = pct < 0.1 ? pct.toFixed(2) : pct.toFixed(1);
    el.querySelector('.legend-pct').textContent = '(' + pctStr + '%)';
  });

  // 绘制左侧环形图 + 连接线
  const canvas = document.getElementById('canvasAbnormal');
  const container = document.getElementById('pieContainer');
  if (!canvas || !container) return;

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = container.getBoundingClientRect();
  const w = rect.width, h = rect.height;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr);

  ctx.clearRect(0, 0, w, h);

  const cx = w / 2, cy = h / 2;
  const radius = Math.min(w, h) / 2 - 15;
  const innerRadius = 0; // 实心饼图
  const MIN_ANGLE = 0.087; // ~5度

  // 计算各扇形角度
  const rawAngles = items.map(item => item.val > 0 ? (item.val / total) * 2 * Math.PI : 0);
  const angles = rawAngles.map(a => a > 0 ? Math.max(a, MIN_ANGLE) : 0);

  // 收集有值的扇形
  const sliceStartAngles = [];
  let startAngle = -Math.PI / 2;
  items.forEach((item, i) => {
    if (item.val === 0) return;
    sliceStartAngles.push(startAngle);
    startAngle += angles[i];
  });

  // 重绘：先画环形
  startAngle = -Math.PI / 2;
  items.forEach((item, i) => {
    if (item.val === 0) return;
    const angle = angles[i];
    // 外弧
    ctx.beginPath();
    ctx.arc(cx, cy, radius, startAngle, startAngle + angle);
    // 内弧（逆时针）
    ctx.arc(cx, cy, innerRadius, startAngle + angle, startAngle, true);
    ctx.closePath();
    ctx.fillStyle = item.color;
    ctx.fill();

    // 扇形边线
    ctx.strokeStyle = '#0d111d';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    startAngle += angle;
  });


  // 中心文字
  ctx.fillStyle = '#e0e8f0';
  ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(total, cx, cy - 8);
  ctx.fillStyle = '#64748b';
  ctx.font = '11px sans-serif';
  ctx.fillText('总行数', cx, cy + 14);
}

// ====== 时间预处理 ======
function stepTimePreprocess() {
  if (!currentHeaders || !currentRows.length) return;

  const ci = getColIndex('creation_date');

  // ====== 第1次点击：定位到creation_date列居中 ======
  if (_timeStage === 0) {
    if (ci < 0) { alert('未找到 creation_date 列'); return; }
    const wrapper = _wrapper;
    const headers = $$('#dataTable thead th');
    for (let i = 0; i < headers.length; i++) {
      if (headers[i].textContent.includes('creation_date')) {
        wrapper.scrollLeft = Math.max(0, headers[i].offsetLeft - wrapper.clientWidth / 2 + headers[i].offsetWidth / 2);
        break;
      }
    }
    _timeStage = 1;
    $$('.btn-preprocess,.btn-miss,.btn-dup,.btn-outlier,.btn-noise,.btn-norm')
      .forEach(b => b.classList.remove('active'));
    _btnTime.classList.add('active');
    stopScroll();
    return;
  }

  // ====== 第2次点击：执行时间戳转换 ======
  if (_timeStage === 1) {
    if (ci < 0) { alert('未找到 creation_date 列，跳过此步骤'); STEP_FLAGS.timePreprocessed = true; _btnMiss.disabled = false; return; }

    // 检测是否unix时间戳
    let validCount = 0;
    for (let r = 0; r < parsedRows.length; r++) {
      const v = parsedRows[r][ci];
      if (!isNaN(v) && v > 1e8 && v < 2e12) validCount++;
    }
    if (validCount < 10) { alert('creation_date 列不是有效unix时间戳，跳过'); STEP_FLAGS.timePreprocessed = true; _btnMiss.disabled = false; return; }

    // 转换: YYYY/MM/DD hh:mm:ss.000
    for (let r = 0; r < parsedRows.length; r++) {
      const v = parsedRows[r][ci];
      if (isNaN(v) || v < 1e8) continue;
      const ts = v;
      const sec = Math.floor(ts);
      const ms = Math.round((ts - sec) * 1000);
      const d = new Date(sec * 1000);
      if (!isNaN(d.getTime())) {
        const yy = String(d.getFullYear());
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const hh = String(d.getHours()).padStart(2, '0');
        const min = String(d.getMinutes()).padStart(2, '0');
        const ss = String(d.getSeconds()).padStart(2, '0');
        currentRows[r][ci] = yy + '/' + mm + '/' + dd + ' ' + hh + ':' + min + ':' + ss + '.' + String(ms).padStart(3, '0');
        parsedRows[r][ci] = NaN;
      }
    }

    STEP_FLAGS.timePreprocessed = true;
    currentHeaders[ci] = currentHeaders[ci] + ' (时间)';
    renderTable();
    // 定位到creation_date列居中
    setTimeout(() => {
      const wrapper = _wrapper;
      const headers = $$('#dataTable thead th');
      for (let i = 0; i < headers.length; i++) {
        if (headers[i].textContent.includes('creation_date')) {
          wrapper.scrollLeft = Math.max(0, headers[i].offsetLeft - wrapper.clientWidth / 2 + headers[i].offsetWidth / 2);
          break;
        }
      }
    }, 100);

    _timeStage = 2;
    _btnMiss.disabled = false;
    $$('.btn-preprocess,.btn-miss,.btn-dup,.btn-outlier,.btn-noise,.btn-norm')
      .forEach(b => b.classList.remove('active'));
    _btnTime.classList.add('active');
    checkExportReady();
    stopScroll();
    return;
  }

  // ====== 第3次及以后：再次定位到creation_date列 ======
  if (_timeStage >= 2) {
    const wrapper = _wrapper;
    const headers = $$('#dataTable thead th');
    for (let i = 0; i < headers.length; i++) {
      if (headers[i].textContent.includes('creation_date')) {
        wrapper.scrollLeft = Math.max(0, headers[i].offsetLeft - wrapper.clientWidth / 2 + headers[i].offsetWidth / 2);
        break;
      }
    }
    stopScroll();
  }
}

// ====== 噪声滤波图表 ======
let noiseFiltered = false;

function drawNoiseSignal() {
  const canvas = document.getElementById('canvasNoise');
  const container = document.getElementById('chartNoise');
  if (!canvas || !container) return;
  const placeholder = container.querySelector('.placeholder');
  if (placeholder) placeholder.style.display = 'none';
  canvas.style.display = 'block';

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = container.getBoundingClientRect();
  canvas.width = (rect.width - 16) * dpr;
  canvas.height = (rect.height - 16) * dpr;
  canvas.style.width = (rect.width - 16) + 'px';
  canvas.style.height = (rect.height - 16) + 'px';
  ctx.scale(dpr, dpr);

  const w = canvas.width / dpr, h = canvas.height / dpr;
  const padding = { top: 30, bottom: 25, left: 40, right: 20 };
  const plotW = w - padding.left - padding.right;
  const plotH = h - padding.top - padding.bottom;

  // 取211-329行的noise_X数据
  const ni = getColIndex('noise_X');
  if (ni < 0) return;
  const startRow = 210, endRow = Math.min(329, currentRows.length);
  const rawVals = [];
  for (let i = startRow; i < endRow; i++) {
    const v = parsedRows[i][ni];
    if (!isNaN(v)) rawVals.push(v);
  }
  if (rawVals.length < 2) return;

  const N = rawVals.length;

  // 移动平均滤波（窗口=5）
  const filteredVals = rawVals.map((_, i) => {
    let sum = 0, count = 0;
    for (let j = -2; j <= 2; j++) {
      const idx = i + j;
      if (idx >= 0 && idx < rawVals.length) { sum += rawVals[idx]; count++; }
    }
    return sum / count;
  });

  ctx.clearRect(0, 0, w, h);

  // 网格
  ctx.strokeStyle = 'rgba(30,58,95,0.5)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = padding.top + (plotH / 4) * i;
    ctx.beginPath(); ctx.moveTo(padding.left, y); ctx.lineTo(w - padding.right, y); ctx.stroke();
  }

  const dataMin = Math.min(...rawVals);
  const dataMax = Math.max(...rawVals);
  const yPad = (dataMax - dataMin) * 0.1 || 1;
  const yMin = dataMin - yPad, yRange = dataMax - dataMin + 2 * yPad;

  function mapX(i) { return padding.left + (i / (N - 1)) * plotW; }
  function mapY(y) { return padding.top + (1 - (y - yMin) / yRange) * plotH; }

  // 原始信号
  ctx.strokeStyle = 'rgba(148,163,184,0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  rawVals.forEach((v, i) => {
    const px = mapX(i), py = mapY(v);
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  });
  ctx.stroke();

  // 图例: 原始
  ctx.fillStyle = 'rgba(148,163,184,0.8)';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillRect(padding.left + 5, padding.top + 5, 12, 2);
  ctx.fillText('原始 noise_X', padding.left + 20, padding.top + 9);

  if (noiseFiltered) {
    // 滤波后
    ctx.strokeStyle = '#22d3ee';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    filteredVals.forEach((v, i) => {
      const px = mapX(i), py = mapY(v);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    });
    ctx.stroke();

    ctx.fillStyle = '#22d3ee';
    ctx.font = 'bold 11px sans-serif';
    ctx.fillRect(padding.left + 130, padding.top + 5, 12, 2.5);
    ctx.fillText('滤波后', padding.left + 145, padding.top + 9);

    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('噪声滤波 (移动平均, 窗口=5) - 已处理', w / 2, padding.top - 8);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('噪声滤波曲线', w / 2, padding.top - 8);
  }

  // Y轴
  ctx.fillStyle = '#64748b';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let i = 0; i <= 4; i++) {
    const v = yMin + (yRange / 4) * (4 - i);
    ctx.fillText(v.toFixed(1), padding.left - 5, padding.top + (plotH / 4) * i);
  }

  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  // X轴标签已删除
}

function stepNoiseFilter() {
  noiseFiltered = true;
  drawNoiseSignal();
  STEP_FLAGS.noiseFiltered = true;
  _btnNorm.disabled = false;
  checkExportReady();
  $$('.btn-preprocess,.btn-miss,.btn-dup,.btn-outlier,.btn-noise,.btn-norm')
    .forEach(b => b.classList.remove('active'));
  _btnNoise.classList.add('active');
}

// ====== 归一化三线图 ======
function drawNormChart() {
  const canvas = document.getElementById('canvasNorm');
  const container = document.getElementById('chartNorm');
  if (!canvas || !container) return;
  const placeholder = container.querySelector('.placeholder');
  if (placeholder) placeholder.style.display = 'none';
  canvas.style.display = 'block';

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = container.getBoundingClientRect();
  canvas.width = (rect.width - 16) * dpr;
  canvas.height = (rect.height - 16) * dpr;
  canvas.style.width = (rect.width - 16) + 'px';
  canvas.style.height = (rect.height - 16) + 'px';
  ctx.scale(dpr, dpr);

  const w = canvas.width / dpr, h = canvas.height / dpr;
  const padding = { top: 30, bottom: 30, left: 45, right: 20 };
  const plotW = w - padding.left - padding.right;
  const plotH = h - padding.top - padding.bottom;

  ctx.clearRect(0, 0, w, h);

  // 网格
  ctx.strokeStyle = 'rgba(30,58,95,0.5)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = padding.top + (plotH / 4) * i;
    ctx.beginPath(); ctx.moveTo(padding.left, y); ctx.lineTo(w - padding.right, y); ctx.stroke();
  }

  // 获取三列数据(归一化前)
  const idxX = getColIndex('vibration_X');
  const idxZ = getColIndex('vibration_Z');
  const idxN = getColIndex('noise_X');
  if (idxX < 0 || idxZ < 0 || idxN < 0) return;

  function getSeries(colIdx) {
    const vals = [];
    for (let r = 0; r < parsedRows.length; r++) {
      const v = parsedRows[r][colIdx];
      if (!isNaN(v)) vals.push(v);
    }
    return vals;
  }

  const series = [
    { name: 'vibration_X', vals: getSeries(idxX), color: '#22d3ee' },
    { name: 'vibration_Z', vals: getSeries(idxZ), color: '#f59e0b' },
    { name: 'noise_X', vals: getSeries(idxN), color: '#ef4444' }
  ];

  // 所有值统一归一化到[0,1]
  let allVals = [];
  series.forEach(s => { allVals = allVals.concat(s.vals); });
  const globalMin = Math.min(...allVals);
  const globalMax = Math.max(...allVals);
  const globalRange = globalMax - globalMin || 1;

  const N = currentRows.length;

  function mapY(val) {
    const norm = (val - globalMin) / globalRange;
    return padding.top + (1 - norm) * plotH;
  }

  // 直接画: 用三个路径
  function drawSeries(colIdx, color, name) {
    const vals = [];
    for (let r = 0; r < currentRows.length; r++) {
      const v = parsedRows[r][colIdx];
      if (!isNaN(v)) vals.push(v);
    }
    if (vals.length < 2) return;

    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    let first = true;
    let xIdx = 0;
    for (let r = 0; r < currentRows.length; r++) {
      const v = parsedRows[r][colIdx];
      if (isNaN(v)) continue;
      const norm = (v - globalMin) / globalRange;
      const px = padding.left + (xIdx / (vals.length - 1)) * plotW;
      const py = padding.top + (1 - norm) * plotH;
      if (first) { ctx.moveTo(px, py); first = false; }
      else { ctx.lineTo(px, py); }
      xIdx++;
    }
    ctx.stroke();
  }

  drawSeries(idxX, '#22d3ee', 'vibration_X');
  drawSeries(idxZ, '#f59e0b', 'vibration_Z');
  drawSeries(idxN, '#ef4444', 'noise_X');

  // 图例
  const legendItems = [
    { name: 'vibration_X', color: '#22d3ee' },
    { name: 'vibration_Z', color: '#f59e0b' },
    { name: 'noise_X', color: '#ef4444' }
  ];
  let lx = padding.left + 5;
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  legendItems.forEach(item => {
    ctx.fillStyle = item.color;
    ctx.fillRect(lx, padding.top + 5, 12, 2.5);
    ctx.fillText(item.name, lx + 15, padding.top + 7);
    lx += ctx.measureText(item.name).width + 35;
  });

  // 标题
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('归一化处理结果 [0, 1]', w / 2, padding.top - 8);

  // Y轴标签
  ctx.fillStyle = '#64748b';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  [0, 0.25, 0.5, 0.75, 1].forEach((v, i) => {
    const y = padding.top + (plotH / 4) * i;
    ctx.fillText(v.toFixed(2), padding.left - 5, y);
  });

  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  // X轴标签已删除
}

// ====== 归一化处理（表格内数值替换为归一化值） ======
function stepNormalize() {
  if (!currentHeaders || !currentRows.length) return;
  if (STEP_FLAGS.normalized) { alert('归一化已完成'); return; }

  const idxX = getColIndex('vibration_X');
  const idxZ = getColIndex('vibration_Z');
  const idxN = getColIndex('noise_X');

  const colNames = [];
  const colIndices = [];
  if (idxX >= 0) { colIndices.push(idxX); colNames.push('vibration_X'); }
  if (idxZ >= 0) { colIndices.push(idxZ); colNames.push('vibration_Z'); }
  if (idxN >= 0) { colIndices.push(idxN); colNames.push('noise_X'); }

  if (colIndices.length === 0) { alert('未找到 vibration_X/vibration_Z/noise_X 列'); return; }

  // 收集所有有效值
  for (let ci of colIndices) {
    const vals = [];
    for (let r = 0; r < parsedRows.length; r++) {
      const v = parsedRows[r][ci];
      if (!isNaN(v)) vals.push(v);
    }
    if (vals.length < 2) continue;
    const colMin = Math.min(...vals);
    const colMax = Math.max(...vals);
    const range = colMax - colMin;
    if (range === 0) continue;

    for (let r = 0; r < parsedRows.length; r++) {
      const v = parsedRows[r][ci];
      if (!isNaN(v)) {
        const norm = (v - colMin) / range;
        currentRows[r][ci] = norm.toFixed(6);
        parsedRows[r][ci] = norm;
      }
    }
    currentHeaders[ci] = currentHeaders[ci] + ' (归一化)';
  }

  STEP_FLAGS.normalized = true;
  renderTable();
  checkExportReady();
  // 归一化处理后导出按钮不可点击
  _btnExport.disabled = true;
  // 重绘归一化图（只显示处理后的数据）
  drawNormChart();

  $$('.btn-preprocess,.btn-miss,.btn-dup,.btn-outlier,.btn-noise,.btn-norm')
    .forEach(b => b.classList.remove('active'));
  _btnNorm.classList.add('active');
}

// ====== 数据质量报告 ======
function stepQualityReport() {
  if (!currentHeaders || !currentRows.length) { alert('请先导入数据集'); return; }
  // 显示右侧图表
  drawCharts();
  // 启用时间预处理按钮（数据质量报告完成后可以开始处理）
  _btnTime.disabled = false;
  $$('.btn-quality,.btn-import,.btn-preprocess,.btn-miss,.btn-dup,.btn-outlier,.btn-noise,.btn-norm')
    .forEach(b => b.classList.remove('active'));
  _btnQuality.classList.add('active');
  // 滚动到表格顶部
  _wrapper.scrollTop = 0;
}

// ====== 图表重绘入口 ======
function drawCharts() {
  drawAbnormalChart();
  drawNoiseSignal();
  drawNormChart();
}

// ====== 导出 ======
function exportDataset() {
  if (_btnExport.disabled) { alert('请先完成所有步骤后再导出'); return; }

  let csv = currentHeaders.join(',') + '\n';
  currentRows.forEach(row => {
    csv += row.map(v => {
      const s = String(v);
      if (s.includes(',') || s.includes('"') || s.includes('\n')) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }).join(',') + '\n';
  });

  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'processed_data.csv';
  link.click();
  URL.revokeObjectURL(link);
  alert('CSV导出完成: ' + currentRows.length + '行');
}

// ====== 窗口resize重绘 ======
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (STEP_FLAGS.imported && _btnQuality.classList.contains('active')) drawCharts();
  }, 300);
});
</script>
